spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://your-azure-mysql-host.mysql.database.azure.com:3306/testdb?useSSL=true&requireSSL=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:your_username}
    password: ${DB_PASSWORD:your_password}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
